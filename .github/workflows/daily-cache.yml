name: Daily Clinic Cache Synchronization

on:
  schedule:
    # Runs at 04:00 UTC every day, which is exactly 00:00 (Midnight) Chilean Time (CLST / UTC-4)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI at any time

jobs:
  cache-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Execute REDCap and PythonAnywhere Cache Sync
        run: node fetch-and-cache.js

      - name: Commit and Push Updated Cache Files
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Check if there are changes in public/data
          git add public/data/*.json
          
          if git diff --cached --quiet; then
            echo "No changes in clinic cache data. Skipping commit."
          else
            git commit -m "chore(cache): automated daily synchronization of closed attention and REDCap data [skip ci]"
            git push
          fi
